# ===== Project: a46094c5-4cff-434b-a815-3e73fc6d39a6 =====

# 后端 API
location /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/api/ {
    set $target_backend a46094c5-4cff-434b-a815-3e73fc6d39a6-backend;
    rewrite ^/autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/api/(.*) /api/$1 break;
    proxy_pass http://$target_backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# 前端页面 - Next.js SSR (trailingSlash: false)
# Next.js 项目：不做 rewrite，直接转发完整路径
# Next.js 自身通过 basePath 配置处理路径前缀
# 注意：trailingSlash=false 时，/autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6 和 /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/ 都需要直接转发
# 不要做 301 重定向，否则与 Next.js 的 308 重定向形成循环
location = /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6 {
    set $target_frontend a46094c5-4cff-434b-a815-3e73fc6d39a6-frontend;
    proxy_pass http://$target_frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/ {
    set $target_frontend a46094c5-4cff-434b-a815-3e73fc6d39a6-frontend;
    proxy_pass http://$target_frontend:3000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
