# Gateway Nginx 配置
# 请将此配置添加到服务器 gateway nginx 的 server 块中

# 无斜杠：直接代理到前端（Next.js trailingSlash: false）
location = /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6 {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# 带斜杠：nginx 直接 301 重定向到无斜杠（避免与 Next.js 形成重定向循环）
location = /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/ {
    return 301 $scheme://$host/autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6;
}

# 前端其他页面（如 /tasks/create）
location /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# 后端 API
location /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/api/ {
    proxy_pass http://127.0.0.1:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
