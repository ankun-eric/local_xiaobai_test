# Gateway Nginx 配置（本地开发用）
# 请将此配置添加到服务器 gateway nginx 的 server 块中

# 无尾部斜杠：301 重定向到带斜杠
location = /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6 {
    return 301 $scheme://$host/autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/;
}

# 后端 API：rewrite 剥离 /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6 前缀后转发
location /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/api/ {
    rewrite ^/autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/api/(.*) /api/$1 break;
    proxy_pass http://127.0.0.1:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}

# 前端页面：不剥离前缀，Next.js 自身处理 basePath
location /autodev/a46094c5-4cff-434b-a815-3e73fc6d39a6/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
